<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌸</text></svg>"
		/>
		<script>
			// Apply the persisted Carbon theme before first paint to avoid a flash
			// of the wrong theme (the Theme component only runs after hydration).
			try {
				document.documentElement.setAttribute(
					'theme',
					localStorage.getItem('theme') === 'white' ? 'white' : 'g100'
				);
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
